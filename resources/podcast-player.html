<div class="podcast-player">
<div class="podcast-buttons">
<button type="button" class="podcast-btn active" data-platform="spotify">
Listen on Spotify
</button>
<button type="button" class="podcast-btn" data-platform="apple">
Listen on Apple Podcasts
</button>
</div>
<div class="player-container" id="podcast-player-container"></div>
</div>

<script>
(function () {
  const spotifyUrl = "{{< meta spotify_embed >}}";
  const appleUrl = "{{< meta apple_embed >}}";

  const spotifyEmbed = `
<iframe
  style="border-radius:12px"
  src="${spotifyUrl}"
  width="100%"
  height="352"
  frameborder="0"
  allowfullscreen
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
  loading="lazy">
</iframe>`;

  const appleEmbed = `
<iframe
  allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write"
  frameborder="0"
  height="175"
  style="width:100%;overflow:hidden;border-radius:12px;"
  sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
  src="${appleUrl}">
</iframe>`;

  const container = document.getElementById("podcast-player-container");
  container.innerHTML = spotifyEmbed;

  document.querySelectorAll(".podcast-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      container.innerHTML = btn.dataset.platform === "spotify" ? spotifyEmbed : appleEmbed;
      document.querySelectorAll(".podcast-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
})();
</script>
